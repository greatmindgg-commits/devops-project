name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      image-tag: ${{ github.sha }}

  security-scan:
    needs: build
    uses: ./.github/workflows/security-scan.yml
    with:
      image-tag: ${{ github.sha }}

  deploy:
    needs: security-scan
    uses: ./.github/workflows/deploy.yml
    with:
      image-tag: ${{ github.sha }}
