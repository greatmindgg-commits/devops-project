name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    uses: ./.github/fragments/build.yml@main
    with:
      image-tag: ${{ github.sha }}

  security-scan:
    needs: build
    uses: ./.github/fragments/security-scan.yml@main
    with:
      image-tag: ${{ github.sha }}

  deploy:
    needs: security-scan
    uses: ./.github/fragments/deploy.yml@main
    with:
      image-tag: ${{ github.sha }}
