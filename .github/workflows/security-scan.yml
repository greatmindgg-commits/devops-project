name: Security Scan

on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-project:${{ inputs.image-tag }}
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
