name: Deploy

on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar

      - name: Deploy to production
        run: echo "Deploying devops-project:${{ inputs.image-tag }} to production"
